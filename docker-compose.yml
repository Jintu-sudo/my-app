services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: auth_db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: App@1234Secure
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "appuser", "-pApp@1234Secure"]
      interval: 5s
      timeout: 10s
      retries: 10

  backend:
    build: ./auth-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/auth_db
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: App@1234Secure
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./auth_app
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
